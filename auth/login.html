<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RanzAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="auth-page">

<div class="top-controls">
  <button class="control-btn" data-theme-toggle>☾ Dark</button>
</div>
<body class="auth-page">
  <div class="auth-card">
  <div class="auth-top"><span class="logo-mark">✦ RanzAI</span><a href="../index.html" class="auth-back">← Kembali</a></div>
  <h1 class="auth-title">Masuk <span>Akun</span></h1>
  <p class="auth-subtitle">Lanjut generate · kelola credit · simpan workflow</p>
  <button class="btn-social" onclick="loginWithGoogle()"><span style="font-size:18px">G</span> Masuk dengan Google</button>
  <div class="or-divider"><span>atau</span></div>
  <div class="field"><label>Email</label><input type="email" id="emailInput" placeholder="kamu@email.com" autocomplete="email"></div>
  <div class="field"><label>Password</label><input type="password" id="passwordInput" placeholder="Password kamu" autocomplete="current-password"></div>
  <button class="btn-submit" id="loginBtn" onclick="loginWithEmail()"><div class="spinner"></div><span class="btn-text">✦ Login</span></button>
  <div class="error-msg" id="errorMsg"></div><div class="success-msg" id="successMsg"></div>
  <div class="free-badge"><span class="free-badge-icon">⚡</span><div class="free-badge-text"><strong>RanzAI Prompt Engine</strong> Masuk untuk lanjut generate dan kelola penggunaan.</div></div>
  <div class="card-footer">Belum punya akun? <a href="register.html">Daftar Gratis →</a></div>
</div>
<script src="../assets/js/auth.js"></script>
<script>
async function loginWithEmail() {
  const email    = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  if (!email || !email.includes('@')) return showError('Email tidak valid.');
  if (!password) return showError('Password wajib diisi.');

  setLoading('loginBtn', true, '✦ Login');

  try {
    const res = await fetch(
      `${SUPABASE_URL}/auth/v1/token?grant_type=password`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
        body: JSON.stringify({ email, password })
      }
    );
    const data = await res.json();

    if (!res.ok) throw new Error(data.error_description || data.msg || 'Login gagal.');

    // simpan session — format flat dari Supabase token endpoint
    const ok = saveSession({ session: data, user: data.user });
    if (!ok) throw new Error('Gagal menyimpan session. Coba lagi.');

    showSuccess('✓ Login berhasil. Mengalihkan...');

    // tunggu sebentar lalu redirect
    setTimeout(goToDashboard, 800);

  } catch(err) {
    showError('⚠ ' + err.message);
  } finally {
    setLoading('loginBtn', false, '✦ Login');
  }
}
document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') loginWithEmail(); });
</script>
</body>
</html>
