<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RanzAI — Image Prompt Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --border: #2a2a30;
    --accent: #e8ff47;
    --accent2: #7c5cfc;
    --text: #f0f0f0;
    --muted: #6b6b7a;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  /* Subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
  }

  /* Upload Zone */
  .upload-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all .25s ease;
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: #1a1a1f;
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 36px;
    margin-bottom: 12px;
    display: block;
  }

  .upload-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .upload-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
  }

  /* Preview */
  .preview-wrap {
    display: none;
    margin-top: 20px;
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border);
  }

  .preview-wrap img {
    width: 100%;
    max-height: 320px;
    object-fit: cover;
    display: block;
  }

  .preview-remove {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,.7);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    transition: background .2s;
  }

  .preview-remove:hover { background: #ff4d4d; border-color: #ff4d4d; }

  /* Output format toggle */
  .format-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .option-group {
    margin-top: 20px;
  }

  .option-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .option-group .format-row {
    margin-top: 0;
  }

  .fmt-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }

  .fmt-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,.06);
  }

  /* Generate Button */
  .btn-generate {
    width: 100%;
    margin-top: 20px;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-generate:hover { background: #d4eb3a; transform: translateY(-1px); }
  .btn-generate:disabled { background: var(--border); color: var(--muted); transform: none; cursor: not-allowed; }

  .btn-generate .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,.3);
    border-top-color: #0d0d0f;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }

  .btn-generate.loading .spinner { display: block; }
  .btn-generate.loading .btn-text { opacity: .6; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  .result-box {
    display: none;
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: #1a1a1f;
  }

  .result-title {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .btn-copy {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
  .btn-copy.copied { border-color: #4dff91; color: #4dff91; }

  .result-content {
    padding: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: #c8c8d8;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
  }

  .result-content::-webkit-scrollbar { width: 4px; }
  .result-content::-webkit-scrollbar-track { background: transparent; }
  .result-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* JSON syntax highlight */
  .key { color: var(--accent2); }
  .string { color: #e8ff47; }
  .number { color: #ff9f47; }

  /* Error */
  .error-msg {
    display: none;
    margin-top: 16px;
    background: rgba(255,77,77,.08);
    border: 1px solid rgba(255,77,77,.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #ff8080;
    font-family: 'Space Mono', monospace;
  }

  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge">✦ RanzAI</div>
    <h1>Image → <span>Prompt</span></h1>
    <p class="subtitle">upload gambar · generate · copy · done</p>
  </header>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*">
    <span class="upload-icon">⬆</span>
    <div class="upload-label">Drop gambar di sini atau klik untuk pilih</div>
    <div class="upload-hint">JPG, PNG, WEBP — maks 10MB</div>
  </div>

  <!-- Preview -->
  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="preview">
    <button class="preview-remove" id="removeBtn">✕ Ganti</button>
  </div>

  <!-- Output Format -->
  <div class="option-group">
    <div class="option-label">Output Format</div>
    <div class="format-row">
      <button class="fmt-btn active" onclick="setFormat('json', this)">JSON Structured</button>
      <button class="fmt-btn" onclick="setFormat('plain', this)">Plain Text</button>
    </div>
  </div>
  
  <!-- Target AI -->
  <div class="option-group">
    <div class="option-label">Target AI</div>
    <div class="format-row">
      <button class="fmt-btn active" onclick="setTargetAI('chatgpt', this)">ChatGPT</button>
      <button class="fmt-btn" onclick="setTargetAI('gemini', this)">Gemini</button>
      <button class="fmt-btn" onclick="setTargetAI('midjourney', this)">Midjourney</button>
    </div>
  </div>
  
  <!-- Visual Style -->
  <div class="option-group">
    <div class="option-label">Visual Style</div>
    <div class="format-row">
      <button class="fmt-btn active" onclick="setVisualStyle('cinematic', this)">Cinematic</button>
      <button class="fmt-btn" onclick="setVisualStyle('poster_ads', this)">Poster Ads</button>
      <button class="fmt-btn" onclick="setVisualStyle('anime', this)">Anime</button>
    </div>
    <div class="format-row" style="margin-top:10px;">
      <button class="fmt-btn" onclick="setVisualStyle('realistic', this)">Realistic</button>
      <button class="fmt-btn" onclick="setVisualStyle('luxury', this)">Luxury</button>
      <button class="fmt-btn" onclick="setVisualStyle('streetwear', this)">Streetwear</button>
    </div>
  </div>

  <!-- Generate -->
  <button class="btn-generate" id="generateBtn" disabled onclick="generatePrompt()">
    <div class="spinner"></div>
    <span class="btn-text">✦ Generate Prompt</span>
  </button>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Result -->
  <div class="result-box" id="resultBox">
    <div class="result-header">
      <span class="result-title">OUTPUT PROMPT</span>
      <button class="btn-copy" id="copyBtn" onclick="copyResult()">Copy</button>
    </div>
    <div class="result-content" id="resultContent"></div>
  </div>

  <footer>RanzAI · powered by OpenAI Vision · by Iky</footer>
</div>

<script>
  let imageBase64 = null;
  let imageMime = 'image/jpeg';

  let currentFormat = 'json';
  let currentTargetAI = 'chatgpt';
  let currentVisualStyle = 'cinematic';

  let rawResult = '';

  // GANTI DENGAN PUBLISHABLE KEY SUPABASE TUAN IKY
  const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_xxxxx';

  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg = document.getElementById('previewImg');
  const generateBtn = document.getElementById('generateBtn');
  const resultBox = document.getElementById('resultBox');
  const resultContent = document.getElementById('resultContent');
  const errorMsg = document.getElementById('errorMsg');
  const removeBtn = document.getElementById('removeBtn');

  // Drag & Drop
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadImage(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadImage(fileInput.files[0]);
  });

  removeBtn.addEventListener('click', () => {
    imageBase64 = null;
    previewWrap.style.display = 'none';
    uploadZone.style.display = 'block';
    generateBtn.disabled = true;
    resultBox.style.display = 'none';
    errorMsg.style.display = 'none';
    fileInput.value = '';
  });

  function loadImage(file) {
    if (!file.type.startsWith('image/')) return showError('File harus berupa gambar.');
    if (file.size > 10 * 1024 * 1024) return showError('Ukuran file maks 10MB.');
    imageMime = file.type;
    const reader = new FileReader();
    reader.onload = e => {
      imageBase64 = e.target.result.split(',')[1];
      previewImg.src = e.target.result;
      previewWrap.style.display = 'block';
      uploadZone.style.display = 'none';
      generateBtn.disabled = false;
      errorMsg.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function setFormat(fmt, el) {
    currentFormat = fmt;
    const buttons = el.closest('.option-group').querySelectorAll('.fmt-btn');
    buttons.forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  function setTargetAI(ai, el) {
    currentTargetAI = ai;
    const buttons = el.closest('.option-group').querySelectorAll('.fmt-btn');
    buttons.forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  function setVisualStyle(style, el) {
    currentVisualStyle = style;
    const buttons = el.closest('.option-group').querySelectorAll('.fmt-btn');
    buttons.forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  function getTargetAIInstruction() {
    const targetMap = {
      chatgpt: 'Optimize the final prompt for ChatGPT image generation. Use natural, descriptive language with clear subject, composition, lighting, mood, background, and quality direction. Do not use Midjourney parameters.',
      gemini: 'Optimize the final prompt for Gemini image generation. Use clean descriptive sentences, clear object relationships, visual hierarchy, and concise artistic direction. Do not use Midjourney parameters.',
      midjourney: 'Optimize the final prompt for Midjourney. Use compact high-impact visual phrases, strong aesthetic keywords, camera and lighting terms, and add suitable Midjourney parameters such as --ar, --style raw, --stylize, only when useful.'
    };

    return targetMap[currentTargetAI] || targetMap.chatgpt;
  }

  function getVisualStyleInstruction() {
    const styleMap = {
      cinematic: 'Visual style: cinematic, premium film still, dramatic composition, atmospheric lighting, strong depth, emotional mood, high-end color grading, realistic visual storytelling.',
      poster_ads: 'Visual style: premium advertising poster, bold composition, strong product/subject focus, clean graphic layout, commercial lighting, editorial polish, high-impact campaign aesthetic.',
      anime: 'Visual style: high-end anime illustration, expressive but clean character rendering, cinematic anime lighting, detailed background, polished Japanese visual direction, not generic.',
      realistic: 'Visual style: photorealistic, natural anatomy, believable lighting, real camera feel, sharp detail, realistic textures, professional photography quality.',
      luxury: 'Visual style: luxury editorial, elegant composition, premium magazine aesthetic, refined lighting, minimal but expensive feel, high-fashion visual language.',
      streetwear: 'Visual style: urban streetwear, bold youth culture, editorial street photography, graphic attitude, modern outfit detail, raw but polished creative direction.'
    };

    return styleMap[currentVisualStyle] || styleMap.cinematic;
  }

  function buildPrompt() {
    const targetAI = getTargetAIInstruction();
    const visualStyle = getVisualStyleInstruction();

    if (currentFormat === 'json') {
      return `Analyze the uploaded image and create a premium image-generation prompt system output.

IMPORTANT RULES:
- Return ONLY valid JSON.
- No markdown.
- No explanation.
- Preserve the key identity and main visual elements from the uploaded image.
- Improve the image into a stronger generation-ready prompt.
- Apply the selected target AI and visual style instructions.

TARGET AI INSTRUCTION:
${targetAI}

VISUAL STYLE INSTRUCTION:
${visualStyle}

Return this exact JSON structure:
{
  "target_ai": "${currentTargetAI}",
  "visual_style": "${currentVisualStyle}",
  "ratio": "detected or recommended aspect ratio",
  "style": "final art/photography style",
  "visual_description": "complete upgraded scene description",
  "main_subject": "main subject with important identity, pose, expression, outfit, and details",
  "supporting_elements": "background, props, environment, symbols, graphic elements",
  "composition": "framing, camera distance, angle, layout, visual hierarchy",
  "lighting": "lighting setup, contrast, shadows, highlights, atmosphere",
  "color_palette": "dominant colors and accent colors",
  "mood": "overall emotional tone and atmosphere",
  "camera_angle": "camera angle, lens feel, depth of field",
  "quality_tags": "generation quality tags suited for the selected target AI",
  "final_prompt": "copy-ready final prompt optimized for the selected target AI and visual style"
}`;
    }

    return `Analyze the uploaded image and generate ONE copy-ready image-generation prompt.

IMPORTANT RULES:
- Output ONLY the final prompt text.
- No explanation.
- No title.
- Preserve the key identity and main visual elements from the uploaded image.
- Upgrade the prompt so it feels premium, detailed, and ready to use.

TARGET AI INSTRUCTION:
${targetAI}

VISUAL STYLE INSTRUCTION:
${visualStyle}

Final prompt requirements:
- Describe main subject clearly.
- Include pose, expression, outfit, background, lighting, mood, composition, camera angle, and quality direction.
- Make the prompt optimized for ${currentTargetAI}.
- Make the visual direction strongly follow ${currentVisualStyle}.
- Keep it powerful but not messy.`;
  }

  async function generatePrompt() {
    if (!imageBase64) return;

    generateBtn.disabled = true;
    generateBtn.classList.add('loading');
    generateBtn.querySelector('.btn-text').textContent = 'Analyzing...';
    resultBox.style.display = 'none';
    errorMsg.style.display = 'none';

    try {
      const response = await fetch(
        'https://cavouyzyasnuygkuwizy.supabase.co/functions/v1/generate-prompt',
        {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_PUBLISHABLE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_PUBLISHABLE_KEY
          },
          body: JSON.stringify({
            imageBase64,
            mimeType: imageMime,
            prompt: buildPrompt()
          })
        }
      );
      
      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.error || 'Generate gagal');
      }
      
      rawResult = data.result || '';
      
      displayResult(rawResult);

    } catch (err) {
      showError('Error: ' + err.message);
    } finally {
      generateBtn.disabled = false;
      generateBtn.classList.remove('loading');
      generateBtn.querySelector('.btn-text').textContent = '✦ Generate Prompt';
    }
  }

  function displayResult(text) {
    resultContent.innerHTML = syntaxHighlight(text);
    resultBox.style.display = 'block';
    resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function syntaxHighlight(text) {
    // Try JSON highlight
    try {
      const parsed = JSON.parse(text.trim());
      const json = JSON.stringify(parsed, null, 2);
      return json
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"([^"]+)":/g, '<span class="key">"$1"</span>:')
        .replace(/: "([^"]*)"(,?)/g, ': <span class="string">"$1"</span>$2')
        .replace(/: (\d+)(,?)/g, ': <span class="number">$1</span>$2');
    } catch {
      // Plain text or mixed — just escape HTML
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/---/g, '<hr style="border-color:#2a2a30;margin:16px 0">');
    }
  }

  function copyResult() {
    navigator.clipboard.writeText(rawResult).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }
</script>
</body>
</html>
