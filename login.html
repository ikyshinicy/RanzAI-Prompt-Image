<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RanzAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --border: #2a2a30;
    --accent: #e8ff47;
    --accent2: #7c5cfc;
    --text: #f0f0f0;
    --muted: #6b6b7a;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow accent */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232,255,71,.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    position: relative;
    z-index: 1;
    animation: fadeUp .4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Top accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 24px; right: 24px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 1px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .logo-mark {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    border: 1px solid rgba(232,255,71,.3);
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  .logo-back {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 1px;
    transition: color .2s;
  }

  .logo-back:hover { color: var(--accent); }

  h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Social login */
  .btn-social {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
    letter-spacing: .5px;
    margin-bottom: 12px;
  }

  .btn-social:hover {
    border-color: rgba(232,255,71,.3);
    background: #1a1a1f;
  }

  .btn-social svg { flex-shrink: 0; }

  /* OR divider */
  .or-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }

  .or-divider::before, .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .or-divider span {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* Form */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }

  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .field-row label {
    margin-bottom: 0;
  }

  .forgot {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 1px;
    transition: color .2s;
  }

  .forgot:hover { color: var(--accent); }

  /* Submit */
  .btn-submit {
    width: 100%;
    margin-top: 8px;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: var(--radius);
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-submit:hover { background: #d4eb3a; transform: translateY(-1px); }
  .btn-submit:disabled { background: var(--border); color: var(--muted); transform: none; cursor: not-allowed; }

  .btn-submit .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,.3);
    border-top-color: #0d0d0f;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }

  .btn-submit.loading .spinner { display: block; }
  .btn-submit.loading .btn-text { opacity: .6; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-msg {
    display: none;
    margin-top: 12px;
    background: rgba(255,77,77,.08);
    border: 1px solid rgba(255,77,77,.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #ff8080;
    font-family: 'Space Mono', monospace;
    text-align: center;
  }

  /* Success */
  .success-msg {
    display: none;
    margin-top: 12px;
    background: rgba(77,255,145,.08);
    border: 1px solid rgba(77,255,145,.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #4dff91;
    font-family: 'Space Mono', monospace;
    text-align: center;
  }

  /* Footer */
  .card-footer {
    margin-top: 24px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .card-footer a {
    color: var(--accent);
    text-decoration: none;
    transition: opacity .2s;
  }

  .card-footer a:hover { opacity: .7; }

  /* Plan info */
  .plan-info {
    margin-top: 24px;
    background: rgba(232,255,71,.04);
    border: 1px solid rgba(232,255,71,.12);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .plan-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .plan-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  .plan-text strong {
    color: var(--accent);
    display: block;
    margin-bottom: 2px;
  }
</style>
</head>
<body>

<div class="card">

  <div class="logo">
    <span class="logo-mark">✦ RanzAI</span>
    <a href="../index.html" class="logo-back">← Kembali</a>
  </div>

  <h1>Masuk ke <span>RanzAI</span></h1>
  <p class="subtitle">Akses generate prompt · pantau quota · kelola akun</p>

  <!-- Google Login -->
  <button class="btn-social" onclick="loginWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
      <path d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Lanjutkan dengan Google
  </button>

  <div class="or-divider"><span>atau</span></div>

  <!-- Email Login -->
  <div class="field">
    <label>Email</label>
    <input type="email" id="emailInput" placeholder="kamu@email.com" autocomplete="email">
  </div>

  <div class="field">
    <div class="field-row">
      <label>Password</label>
      <a href="#" class="forgot" onclick="forgotPassword()">Lupa password?</a>
    </div>
    <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-submit" id="loginBtn" onclick="loginWithEmail()">
    <div class="spinner"></div>
    <span class="btn-text">✦ Masuk</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <!-- Free plan info -->
  <div class="plan-info">
    <span class="plan-icon">🎁</span>
    <div class="plan-text">
      <strong>Free Plan — 5 generate/hari</strong>
      Login untuk mulai. Upgrade ke Pro untuk unlimited.
    </div>
  </div>

  <div class="card-footer">
    Belum punya akun? <a href="register.html">Daftar gratis →</a>
  </div>

</div>

<script>
  // ── Supabase config ──────────────────────────────────────────────
  const SUPABASE_URL  = 'sb_publishable_6eixKKot9VleMm2KVD4o7w_C58lRv6r'
  const SUPABASE_ANON = 'GANTI_DENGAN_ANON_KEY_KAMU' // ← ambil dari Supabase → Settings → API

  // ── Helpers ──────────────────────────────────────────────────────
  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg
    document.getElementById('errorMsg').style.display = 'block'
    document.getElementById('successMsg').style.display = 'none'
  }

  function showSuccess(msg) {
    document.getElementById('successMsg').textContent = msg
    document.getElementById('successMsg').style.display = 'block'
    document.getElementById('errorMsg').style.display = 'none'
  }

  function setLoading(on) {
    const btn = document.getElementById('loginBtn')
    btn.disabled = on
    btn.classList.toggle('loading', on)
    btn.querySelector('.btn-text').textContent = on ? 'Memproses...' : '✦ Masuk'
  }

  // ── Google OAuth ─────────────────────────────────────────────────
  async function loginWithGoogle() {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${location.origin}/app.html`, {
        method: 'GET',
        headers: { 'apikey': SUPABASE_ANON }
      })
      // Redirect ke Google OAuth
      window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(location.origin + '/app.html')}`
    } catch (err) {
      showError('Google login gagal. Coba lagi.')
    }
  }

  // ── Email + Password Login ────────────────────────────────────────
  async function loginWithEmail() {
    const email    = document.getElementById('emailInput').value.trim()
    const password = document.getElementById('passwordInput').value

    if (!email || !password) return showError('Email dan password wajib diisi.')
    if (!email.includes('@')) return showError('Format email tidak valid.')

    setLoading(true)
    document.getElementById('errorMsg').style.display = 'none'

    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON
        },
        body: JSON.stringify({ email, password })
      })

      const data = await res.json()

      if (!res.ok) {
        const msg = data.error_description || data.msg || 'Login gagal.'
        if (msg.toLowerCase().includes('invalid')) throw new Error('Email atau password salah.')
        if (msg.toLowerCase().includes('confirmed')) throw new Error('Email belum diverifikasi. Cek inbox kamu.')
        throw new Error(msg)
      }

      // Simpan session
      localStorage.setItem('ranzai_session', JSON.stringify({
        access_token: data.access_token,
        user: data.user
      }))

      showSuccess('✓ Login berhasil! Mengalihkan...')
      setTimeout(() => { window.location.href = '../app.html' }, 1200)

    } catch (err) {
      showError('⚠ ' + err.message)
    } finally {
      setLoading(false)
    }
  }

  // ── Forgot Password ───────────────────────────────────────────────
  async function forgotPassword() {
    const email = document.getElementById('emailInput').value.trim()
    if (!email) return showError('Isi email dulu sebelum reset password.')

    try {
      await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON
        },
        body: JSON.stringify({ email })
      })
      showSuccess('✓ Link reset password dikirim ke ' + email)
    } catch {
      showError('Gagal kirim email reset. Coba lagi.')
    }
  }

  // ── Enter key submit ──────────────────────────────────────────────
  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') loginWithEmail()
  })

  // ── Cek kalau sudah login ─────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const session = localStorage.getItem('ranzai_session')
    if (session) {
      try {
        const { access_token } = JSON.parse(session)
        if (access_token) window.location.href = '../app.html'
      } catch {}
    }
  })
</script>
</body>
</html>
